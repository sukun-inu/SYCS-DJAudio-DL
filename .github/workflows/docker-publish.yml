name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BOT_IMAGE: ghcr.io/sukun-inu/sycs-djaudio-dl-bot
  FLASK_IMAGE: ghcr.io/sukun-inu/sycs-djaudio-dl-flask

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot image
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: true
          tags: ${{ env.BOT_IMAGE }}:latest

      - name: Build and push flask image
        uses: docker/build-push-action@v6
        with:
          context: ./flask_server
          push: true
          tags: ${{ env.FLASK_IMAGE }}:latest
